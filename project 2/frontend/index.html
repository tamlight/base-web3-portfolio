<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Escrow - Secure On-Chain Trading</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
        }

        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(90deg, #fff, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn { 
            padding: 0.8rem 1.5rem; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; background: var(--primary); color: #fff;
        }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); }

        .card { background: var(--card); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); }
        .card h2 { margin-bottom: 1.5rem; font-size: 1.2rem; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 1rem; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; outline: none; }
        input:focus { border-color: var(--primary); }

        .escrow-list { display: flex; flex-direction: column; gap: 1rem; }
        .escrow-item { background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .escrow-info { display: flex; flex-direction: column; gap: 0.3rem; }
        .status { font-size: 0.7rem; text-transform: uppercase; padding: 0.3rem 0.6rem; border-radius: 20px; background: rgba(59, 130, 246, 0.2); color: #3b82f6; width: fit-content; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Base Escrow</h1>
            <button id="connectBtn" class="btn btn-outline" onclick="connectWallet()">Connect Wallet</button>
        </header>

        <div class="card">
            <h2>Create New Escrow</h2>
            <div class="form-group">
                <label>Seller Address</label>
                <input type="text" id="sellerAddr" placeholder="0x...">
            </div>
            <div class="form-group">
                <label>Amount (ETH)</label>
                <input type="number" id="amount" step="0.01" placeholder="0.1">
            </div>
            <button class="btn" style="width: 100%" onclick="createEscrow()">Start Transaction</button>
        </div>

        <div class="card">
            <h2>Your Transactions</h2>
            <div id="escrowList" class="escrow-list">
                <p style="color: #666; text-align: center;">Connect wallet to view your escrows</p>
            </div>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0xD1da1A78e0645722deA52B3a58779045f310c8dE"; 
        const ABI = [
            "function createEscrow(address _seller) external payable returns (uint256)",
            "function confirmReceipt(uint256 _escrowId) external",
            "function refundSellerToBuyer(uint256 _escrowId) external",
            "function getEscrow(uint256 _escrowId) external view returns (address, address, uint256, uint8, uint256)",
            "function nextEscrowId() public view returns (uint256)"
        ];

        let provider, signer, contract;

        async function connectWallet() {
            if (window.ethereum) {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                const address = await signer.getAddress();
                document.getElementById('connectBtn').innerText = `${address.substring(0,6)}...${address.substring(38)}`;
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                loadEscrows();
            } else {
                alert("Please install MetaMask!");
            }
        }

        async function createEscrow() {
            const seller = document.getElementById('sellerAddr').value;
            const ethAmount = document.getElementById('amount').value;
            if (!seller || !ethAmount) return alert("Please fill details");

            const tx = await contract.createEscrow(seller, { value: ethers.utils.parseEther(ethAmount) });
            await tx.wait();
            alert("Escrow created!");
            loadEscrows();
        }

        async function loadEscrows() {
            const count = await contract.nextEscrowId();
            const list = document.getElementById('escrowList');
            list.innerHTML = "";
            const currentAddr = await signer.getAddress();

            for (let i = 0; i < count; i++) {
                const escrow = await contract.getEscrow(i);
                if (escrow[0] === currentAddr || escrow[1] === currentAddr) {
                    const item = document.createElement('div');
                    item.className = "escrow-item";
                    item.innerHTML = `
                        <div class="escrow-info">
                            <span class="status">${['OPEN', 'COMPLETED', 'REFUNDED'][escrow[3]]}</span>
                            <strong>${ethers.utils.formatEther(escrow[2])} ETH</strong>
                            <small>${escrow[1].substring(0,8)}...</small>
                        </div>
                        ${escrow[3] === 0 && escrow[0] === currentAddr ? 
                            `<button class="btn btn-outline" onclick="release(${i})">Release Funds</button>` : ''}
                        ${escrow[3] === 0 && escrow[1] === currentAddr ? 
                            `<button class="btn btn-outline" onclick="refund(${i})">Refund Buyer</button>` : ''}
                    `;
                    list.appendChild(item);
                }
            }
        }

        async function release(id) {
            const tx = await contract.confirmReceipt(id);
            await tx.wait();
            loadEscrows();
        }

        async function refund(id) {
            const tx = await contract.refundSellerToBuyer(id);
            await tx.wait();
            loadEscrows();
        }
    </script>
</body>
</html>
